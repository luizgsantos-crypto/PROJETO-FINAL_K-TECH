<div *ngIf="isVisible" class="fixed bottom-6 right-6 z-40 max-w-md banner-enter">
  <div class="bg-ktech-surface border border-ktech-teal/30 rounded-2xl p-6 shadow-2xl shadow-ktech-teal/20">
    <p class="text-white/80 text-sm mb-4 leading-relaxed">
      Nós utilizamos cookies para melhorar sua experiência e proteger seus dados.
    </p>
    <button
      type="button"
      (click)="aceitarCookies()"
      class="w-full px-6 py-2.5 bg-gradient-to-r from-ktech-teal to-ktech-cyan text-ktech-dark rounded-lg hover:shadow-lg hover:shadow-ktech-cyan/50 transition-all duration-300 font-semibold"
    >
      Aceitar
    </button>
  </div>
</div>
